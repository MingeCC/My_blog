<!doctype html>
<html lang="{{ site.LanguageCode | default `zh-cn` }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ "index.xml" | absURL }}">
    <link rel="stylesheet" href="{{ "css/main.css" | relURL }}?v={{ now | time.Format "20060102-1504" }}">
  </head>
  <body>
    {{ partial "header.html" . }}
    <main class="page-shell">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    {{ if site.Params.enablePageView }}
      <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    {{ end }}
  </body>
</html>
