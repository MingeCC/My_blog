baseURL = "https://example.org/"
languageCode = "zh-cn"
title = "Mingyi Blog"
enableRobotsTXT = true
summaryLength = 28

[pagination]
pagerSize = 6

[caches]
  [caches.images]
  dir = ":cacheDir/images"

[taxonomies]
tag = "tags"
category = "categories"

[params]
author = "Mingyi"
description = "一个用 Hugo 搭建的个人博客，记录技术、写作与生活。"
subtitle = "Keep it simple, keep it published."
mainSections = ["posts"]

[markup]
[markup.goldmark.renderer]
unsafe = false

[markup.tableOfContents]
startLevel = 2
endLevel = 3
ordered = false

[[menus.main]]
name = "首页"
pageRef = "/"
weight = 10

[[menus.main]]
name = "文章"
pageRef = "/posts"
weight = 20

[[menus.main]]
name = "标签"
pageRef = "/tags"
weight = 30

[[menus.main]]
name = "关于"
url = "/about/"
weight = 40
